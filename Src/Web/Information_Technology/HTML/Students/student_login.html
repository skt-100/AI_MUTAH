<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - جامعة مؤتة</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/Information_Technology/CSS/Students/student_login.css">
</head>
<body>
    <div class="login-box">
        <img src="/Information_Technology/.img/mutah_logo.png" alt="شعار الجامعة">
        <h1>جامعة مؤتة</h1>
        <h2>كلية تكنولوجيا المعلومات</h2>

        <form id="loginForm" novalidate>
            <label for="userId">الرقم الجامعي</label>
            <input id="userId" type="text" inputmode="numeric" placeholder="أدخل الرقم هنا..." autocomplete="off">
            <span id="userIdError" class="error-msg"></span>

            <label for="passwordInput">كلمة المرور</label>
            <input id="passwordInput" type="password" name="password" placeholder="••••••••">
            <span id="passwordInputError" class="error-msg"></span>

            <button type="submit">تسجيل الدخول</button>
        </form>
    </div>

    <script src="/Information_Technology/JS/Students/student_login.js"></script>
</body>
</html>
