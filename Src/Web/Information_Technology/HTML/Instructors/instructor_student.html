<!DOCTYPE html> 
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الحضور والعلامات | Smart IT Faculty</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/Information_Technology/CSS/Instructors/instructor_student.css">
</head>
<body>

    <header class="topbar"></header>

    <div class="layout"> 
        
        <aside class="sidebar"></aside>

        <main class="main-content"> 
            
            <div class="welcome-banner">
                <div class="welcome-inner">
                    <span class="welcome-icon">👨‍🏫</span>
                    <span class="welcome-text">أهلاً بك يا <strong id="navDrName">دكتور</strong>. يمكنك من هنا التنقل المرن بين رصد غيابات الطلاب أو إدخال علامات الفصول الأكاديمية حياً.</span>
                </div>
            </div>

            <section class="white-card"> 
                <div class="selection-row">
                    <div class="input-group">
                        <label for="courseSelect">المساق الأكاديمي:</label>
                        <select id="courseSelect" class="table-input">
                            <option value="">-- اختر المساق --</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="sectionSelect">الشعبة الدراسية:</label>
                        <select id="sectionSelect" class="table-input"> 
                            <option value="">-- اختر الشعبة --</option>
                        </select>
                    </div>
                </div>
            </section>

            <section class="white-card table-section-card"> 
                <h2 id="tableTitle">قائمة رصد الطلاب</h2>
                
                <div class="table-responsive-box"> 
                    <table class="data-table" id="studentsTable"> 
                        <thead>
                            </thead>
                        <tbody id="tableBody">
                            <tr>
                                <td style="text-align:center; padding:30px; color:#7f8c8d;">💡 يرجى اختيار المساق والشعبة لعرض البيانات والبدء بالرصد الأكاديمي.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <div class="action-footer">
                    <button type="button" id="saveAllBtn" class="submit-btn">💾 حفظ وتحديث قاعدة البيانات الحية</button>
                </div>
            </section>
        </main>
    </div>
    
    <script src="/Information_Technology/JS/Instructors/instructor_student.js"></script>
</body>
</html>
